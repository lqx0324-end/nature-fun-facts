<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自然冷知识 - 地球上那些你不知道的事</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <main id="page-home" class="page active">
      <header class="page-header">
        <h1>自然冷知识</h1>
        <p class="subtitle">地球上那些你不知道的事</p>
      </header>
      <div id="daily-card-container"></div>
    </main>

    <main id="page-explore" class="page">
      <header class="page-header">
        <h1>探索</h1>
      </header>
      <div class="category-filters" id="category-filters"></div>
      <div id="explore-cards-container" class="cards-grid"></div>
    </main>

    <main id="page-favorites" class="page">
      <header class="page-header">
        <h1>我的收藏</h1>
      </header>
      <div id="favorites-cards-container" class="cards-grid"></div>
      <div id="favorites-empty" class="empty-state" style="display:none;">
        <p>还没有收藏任何冷知识</p>
        <p class="hint">翻牌后点击收藏按钮，把喜欢的知识存起来</p>
      </div>
    </main>

    <div id="settings-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <button class="modal-close" id="settings-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="api-provider">AI 服务商</label>
            <select id="api-provider">
              <option value="openai">OpenAI</option>
              <option value="google">Google Gemini</option>
            </select>
          </div>
          <div class="form-group">
            <label for="api-key">API Key</label>
            <input type="password" id="api-key" placeholder="输入你的 API Key">
          </div>
          <button id="settings-save" class="btn btn-primary">保存</button>
          <p class="settings-hint">API Key 仅存储在本地浏览器中，不会上传到任何服务器</p>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="#home" class="nav-item active" data-page="home">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z" fill="currentColor"/></svg>
        <span>首页</span>
      </a>
      <a href="#explore" class="nav-item" data-page="explore">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19z" fill="currentColor"/></svg>
        <span>探索</span>
      </a>
      <a href="#favorites" class="nav-item" data-page="favorites">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/></svg>
        <span>收藏</span>
      </a>
      <button class="nav-item settings-btn" id="settings-btn">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/></svg>
        <span>设置</span>
      </button>
    </nav>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/card.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
